<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <title>500 — Erreur serveur · Tattoosphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .pattern {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 1px, transparent 1px, transparent 14px),
        repeating-linear-gradient(-45deg, #1a1a1a 0px, #1a1a1a 1px, transparent 1px, transparent 14px);
      opacity: 0.4;
    }

    .container {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
      text-decoration: none;
    }
    .logo span:first-child { color: #fff; }
    .logo span:last-child  { color: #F5C500; }

    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      color: #F5C500;
      line-height: 1;
      letter-spacing: 0.04em;
      text-shadow: 0 0 80px rgba(245,197,0,0.15);
    }

    .divider {
      width: 60px; height: 3px;
      background: #F5C500;
      margin: 1.5rem auto;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .desc {
      font-size: 1rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #F5C500;
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      padding: 0.65rem 1.75rem;
      text-decoration: none;
      border-radius: 2px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }

    .btn-ghost {
      background: transparent;
      color: #888;
      border: 1px solid #2a2a2a;
      margin-left: 0.5rem;
    }
    .btn-ghost:hover { color: #fff; border-color: #555; opacity: 1; }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #333;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="pattern"></div>

  <div class="container">
    <a href="/" class="logo">
      <span>Tattoo</span><span>sphere</span>
    </a>

    <div class="code">500</div>
    <div class="divider"></div>

    <h1 class="title">Erreur interne du serveur</h1>
    <p class="desc">
      Quelque chose s'est mal passé de notre côté.<br>
      Notre équipe a été notifiée. Réessaie dans quelques instants.
    </p>

    <div>
      <a href="/" class="btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Retour à l'accueil
      </a>
      <a href="javascript:location.reload()" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Réessayer
      </a>
    </div>
  </div>

  <div class="footer">© 2026 Tattoosphere — Tous droits réservés</div>
</body>
</html>
